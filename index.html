<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wigellkoncernens Biluthyrning</title>
    <link rel="icon" type="image/x-icon" href="KoncernLogga.png">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">

   
</head>
<body>
    <div id="navigation">
 <img src="KoncernensLogga.png" alt="Wigellkoncernens Biluthyrning Logga" class="logo">
 <nav id="navContainer">
<ul class="navClass">
<li><a href="#loggInDiv">Logga in</a></li>
<li><a href="#createAccount">Skapa konto</a></li>
</ul>
</nav>
    </div>

    <div id="loggInDiv">
<form id="loggInForm">
<h3>Logga in</h3>
<label for="username">Användarnamn:</label>
<input type="text" id="username" name="username" placeholder="Användarnamn"><br>
<label for="password" name="password">Lösenord:</label>
<input type="password" id="password" name="password" placeholder="Lösenord"><br>
<button type="submit">Logga in</button>
<p id="validationLoggIn"></p>
</form>
    </div>
    <div id="createAccount">
        <form id="createAccountForm">
        <h2>Skapa nytt konto</h2>
        <label for="createUsername">Skapa användarnamn:</label>
        <input type="text" id="createUsername" name="createUsername" placeholder="Användarnamn"><br>
        <label for="createPassword" name="createPassword">Skapa lösenord:</label>
        <input type="password" id="createPassword" name="createPassword" placeholder="Lösenord"><br>
        <label for="first_name">Förnamn:</label>
        <input type="text" id="first_name" name="first_name"><br>
        <label for="last_name">Efternamn:</label>
        <input type="text" id="last_name" name="last_name"><br>
        <label for="phone">Telefonnummer:</label>
        <input type="text" id="phone" name="phone"><br>
        <label for="email">E-post:</label>
        <input type="email" id="email" name="email"><br>
        <label for="role">Roll:</label>
        <input type="text" id="role" name="role"><br>
        <button type="submit" id="createAccountBtn">Skapa konto</button>
        </form>
        <p id="createMsg"></p>
    </div>

<footer class="commercial">
    <div class="commercialText"> <p>Reklamplatser</p></div>
    <div id="middleFoot"><img src="blueCar.jfif" alt="Bild på blå bil"></div>
    <div id="rightFoot">Hyr bilen här</div>
   
    
    
</footer>
<p>&copy; 2023 Wigellkoncernens Biluthyrning. Alla rättigheter förbehållna.</p>
    <script src="script.js"></script>
    <script src="usersScript.js"></script>
</body>
</html>
